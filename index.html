<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CafeClick</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf7f2;
      --surface: #ffffff;
      --surface-soft: #f3ebe2;
      --border: rgba(120, 90, 60, 0.15);
      --border-strong: rgba(120, 90, 60, 0.3);
      --text: #2c1f0e;
      --text-soft: #7a6352;
      --text-muted: #b0a090;
      --accent: #a0522d;
      --accent-soft: #d8b799;
      --green-bg: #e8f5e9;
      --green-text: #2e7d32;
      --info-bg: #e3f2fd;
      --info-text: #1565c0;
      --gold-bg: #fff5d6;
      --gold-text: #8d5b00;
      --shadow: 0 18px 40px rgba(120, 90, 60, 0.08);
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 244, 227, 0.8), transparent 45%),
        linear-gradient(180deg, #fdfaf6 0%, #f7f1e7 100%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 16px 24px;
      background: rgba(255, 255, 255, 0.92);
      border-bottom: 0.5px solid var(--border-strong);
      display: flex;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(14px);
    }

    header span {
      font-size: 22px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.02em;
    }

    main {
      width: 100%;
      max-width: 860px;
      padding: 28px 16px 40px;
      display: flex;
      gap: 20px;
    }

    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .stats-row {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.88);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 11px 8px;
      text-align: center;
      box-shadow: 0 12px 24px rgba(120, 90, 60, 0.05);
    }

    .stat-card .label {
      font-size: 11px;
      color: var(--text-soft);
      margin-bottom: 4px;
    }

    .stat-card .value {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .milestone {
      font-size: 13px;
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .btn-wrap {
      position: relative;
      width: 170px;
      height: 170px;
    }

    #brew-btn {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      border: 0.5px solid var(--border-strong);
      background:
        radial-gradient(circle at 30% 30%, #fffaf4 0%, #f6eadf 45%, #e7d3c0 100%);
      font-size: 64px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 16px 32px rgba(120, 90, 60, 0.15);
      transition: transform 0.08s, box-shadow 0.08s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    #brew-btn:active {
      transform: scale(0.92);
      box-shadow: 0 8px 16px rgba(120, 90, 60, 0.12);
    }

    #brew-btn.scale-up {
      animation: scale-up 0.36s ease;
    }

    #brew-btn.pulse {
      animation: pulse 0.36s ease;
    }

    .particle {
      position: absolute;
      font-weight: 600;
      color: var(--accent);
      pointer-events: none;
      white-space: nowrap;
      animation: float-up 0.85s ease-out forwards;
      text-shadow: 0 4px 14px rgba(255, 255, 255, 0.65);
    }

    .particle.burst {
      color: var(--text);
      animation-duration: 1s;
    }

    .coffee-card,
    .cafe-story {
      width: 100%;
      max-width: 360px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.86);
      border: 0.5px solid var(--border);
      box-shadow: 0 10px 24px rgba(120, 90, 60, 0.05);
      text-align: center;
    }

    .coffee-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .coffee-desc,
    .cafe-story {
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-soft);
    }

    .cpc-label {
      font-size: 12px;
      color: var(--text-soft);
    }

    .toast {
      background: var(--green-bg);
      color: var(--green-text);
      border: 0.5px solid rgba(46, 125, 50, 0.25);
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      max-width: 360px;
      box-shadow: 0 12px 20px rgba(46, 125, 50, 0.08);
    }

    .toast-placeholder {
      height: 36px;
    }

    .right {
      width: 270px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .prestige-card {
      background: rgba(255, 252, 243, 0.96);
      border: 0.5px solid rgba(141, 91, 0, 0.18);
      border-radius: 16px;
      box-shadow: 0 12px 24px rgba(141, 91, 0, 0.08);
      padding: 14px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .prestige-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--gold-text);
      letter-spacing: 0.04em;
    }

    .prestige-main {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .prestige-sub {
      font-size: 12px;
      color: var(--text-soft);
      line-height: 1.5;
    }

    #prestige-btn {
      margin-top: 4px;
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      background: linear-gradient(135deg, #d59b37 0%, #b97b1d 100%);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 18px rgba(185, 123, 29, 0.18);
    }

    #prestige-btn:disabled {
      opacity: 0.45;
      cursor: default;
      box-shadow: none;
    }

    .shop-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-soft);
      padding-left: 2px;
    }

    #shop {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .upg-btn {
      width: 100%;
      padding: 10px 11px;
      background: rgba(255, 255, 255, 0.92);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      text-align: left;
      transition: border-color 0.12s, transform 0.12s, opacity 0.12s;
      outline: none;
    }

    .upg-btn:hover:not(:disabled) {
      border-color: var(--border-strong);
      transform: translateY(-1px);
    }

    .upg-btn:disabled {
      opacity: 0.44;
      cursor: default;
    }

    .upg-icon {
      font-size: 20px;
      flex-shrink: 0;
    }

    .upg-info {
      flex: 1;
      min-width: 0;
    }

    .upg-row1,
    .upg-row2 {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .upg-row1 {
      margin-bottom: 3px;
    }

    .upg-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }

    .upg-count {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 99px;
      background: var(--info-bg);
      color: var(--info-text);
      flex-shrink: 0;
    }

    .upg-desc {
      font-size: 10px;
      color: var(--text-soft);
    }

    .upg-cost {
      font-size: 10px;
      font-weight: 700;
      color: var(--text);
    }

    .upg-cost.muted {
      color: var(--text-muted);
    }

    @keyframes float-up {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-60px) scale(1.08); opacity: 0; }
    }

    @keyframes scale-up {
      0% { transform: scale(1); }
      35% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 16px 32px rgba(120, 90, 60, 0.15); }
      50% { transform: scale(1.03); box-shadow: 0 18px 34px rgba(160, 82, 45, 0.2); }
      100% { transform: scale(1); box-shadow: 0 16px 32px rgba(120, 90, 60, 0.15); }
    }

    @media (max-width: 640px) {
      header {
        padding: 14px 16px;
      }

      main {
        flex-direction: column;
        align-items: center;
      }

      .right {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <span>☕</span>
    <h1>CafeClick</h1>
  </header>

  <main>
    <div class="left">
      <div class="stats-row" id="stats"></div>
      <div class="milestone" id="milestone">작은 카페</div>
      <div class="btn-wrap" id="btn-wrap">
        <button id="brew-btn" aria-label="커피 내리기">☕</button>
      </div>
      <div class="coffee-card">
        <div class="coffee-name" id="coffee-name">맥심 모카골드</div>
        <div class="coffee-desc" id="coffee-desc">종이컵에 뜨거운 물만 부었다.</div>
      </div>
      <div class="cpc-label" id="cpc-label">클릭당 1원</div>
      <div class="cafe-story" id="cafe-story">낡은 플라스틱 의자 2개와 메뉴판이 전부인 작은 공간이다.</div>
      <div id="toast-area"><div class="toast-placeholder"></div></div>
    </div>

    <div class="right">
      <div class="prestige-card">
        <div class="prestige-title" id="prestige-title">환생</div>
        <div class="prestige-main" id="prestige-beans">황금 원두 0개</div>
        <div class="prestige-sub" id="prestige-bonus">영구 수익 +0%</div>
        <div class="prestige-sub" id="prestige-preview">지금 환생하면 황금 원두 +0</div>
        <button id="prestige-btn" disabled>환생하기</button>
      </div>
      <div class="shop-title">업그레이드</div>
      <div id="shop"></div>
    </div>
  </main>

  <script>
    const SAVE_KEY = 'cafeClickSave';
    const SAVE_VERSION = 2;
    const SCALE = 1000n;
    const COST_RATIO_SCALE = 1000n;
    const BPS_BASE = 10000n;
    const PRESTIGE_BONUS_PER_BEAN = 500n;
    const PRESTIGE_THRESHOLD = 1000000n;
    const DRAW_INTERVAL_MS = 80;
    const AUTO_SAVE_INTERVAL_MS = 1200;
    const COFFEE_STAGE_STEP = 1000000n;

    const COFFEES = [
      { unlockAt: 0n, name: '맥심 모카골드', desc: '종이컵에 뜨거운 물만 부었다.', emoji: '☕' },
      { unlockAt: 50n, name: '캔커피 (레쓰비)', desc: '자판기에서 뽑았다. 따뜻하다.', emoji: '🥤' },
      { unlockAt: 200n, name: '아메리카노', desc: '편의점 원두커피. 그래도 원두다.', emoji: '☕' },
      { unlockAt: 600n, name: '에스프레소', desc: '진하다. 쓰다. 눈이 떠진다.', emoji: '🖤' },
      { unlockAt: 1500n, name: '카페라떼', desc: '우유가 들어갔다. 부드럽다.', emoji: '🥛' },
      { unlockAt: 4000n, name: '카푸치노', desc: '거품이 올라간다. 손님이 늘었다.', emoji: '☁️' },
      { unlockAt: 10000n, name: '플랫화이트', desc: '진하지만 부드럽다. 단골이 생긴다.', emoji: '🤍' },
      { unlockAt: 25000n, name: '콜드브루', desc: '12시간 저온 추출. 매장에도 여유가 생긴다.', emoji: '🧊' },
      { unlockAt: 60000n, name: '시그니처 핸드드립', desc: '이제 원두의 취향을 설명할 수 있다.', emoji: '🫗' },
      { unlockAt: 120000n, name: '커피 리저브', desc: '희귀한 원두가 메뉴판에 올라간다.', emoji: '🏷️' },
      { unlockAt: 300000n, name: '브루 마운틴', desc: '원두의 이름이 브랜드가 되기 시작한다.', emoji: '🏔️' },
      { unlockAt: 700000n, name: '파나마 게이샤', desc: '경매에서 이름값을 하는 카페가 되었다.', emoji: '🏆' },
      { unlockAt: 1000000n, name: '블랙 아이보리', desc: '희소성과 품질을 동시에 갖춘 상징이 되었다.', emoji: '🌍' }
    ];

    const MILESTONES = [
      { unlockAt: 0n, name: '작은 카페', desc: '낡은 플라스틱 의자 2개와 메뉴판이 전부인 작은 공간이다.' },
      { unlockAt: 100n, name: '단골이 생겼어', desc: '매일 같은 시간에 아메리카노를 찾는 손님이 보이기 시작한다.' },
      { unlockAt: 1000n, name: '지역 명소', desc: 'SNS에 사진이 올라오기 시작했고 점심 시간엔 줄이 생겼다.' },
      { unlockAt: 10000n, name: '유명 카페', desc: '새 메뉴가 나오면 일부러 찾아오는 손님이 생긴다.' },
      { unlockAt: 100000n, name: '커피 제국', desc: '한 동네의 카페를 넘어 작은 브랜드처럼 움직이기 시작한다.' },
      { unlockAt: 1000000n, name: '글로벌 프랜차이즈', desc: '환생과 확장을 반복하며 끝없이 수익 구조를 키우는 구간이다.' }
    ];

    const UPGRADES = [
      { id: 'beans', name: '좋은 원두', emoji: '🫘', desc: '클릭당 +1', baseCost: 15n, costRatio: 1600n, clickGain: 1n, passiveGain: 0n, toast: '' },
      { id: 'machine', name: '에스프레소 머신', emoji: '⚙️', desc: '초당 +2', baseCost: 50n, costRatio: 1600n, clickGain: 0n, passiveGain: 2n, toast: '머신의 압력이 커피 맛과 속도를 동시에 끌어올린다.' },
      { id: 'barista', name: '바리스타 고용', emoji: '👩‍🍳', desc: '초당 +10', baseCost: 200n, costRatio: 1600n, clickGain: 0n, passiveGain: 10n, toast: '바리스타가 생기자 손님 응대와 추출 속도가 안정됐다.' },
      { id: 'deco', name: '인테리어 개선', emoji: '🪑', desc: '클릭당 +5', baseCost: 400n, costRatio: 1600n, clickGain: 5n, passiveGain: 0n, toast: '' },
      { id: 'delivery', name: '배달 서비스', emoji: '🛵', desc: '초당 +25', baseCost: 1000n, costRatio: 1600n, clickGain: 0n, passiveGain: 25n, toast: '배달 주문이 열리자 카운터가 쉬지 않는다.' },
      { id: 'branch', name: '2호점 오픈', emoji: '🏪', desc: '초당 +100', baseCost: 5000n, costRatio: 1600n, clickGain: 0n, passiveGain: 100n, toast: '다른 동네에도 같은 간판이 달리기 시작했다.' },
      { id: 'franchise', name: '프랜차이즈', emoji: '📈', desc: '초당 +500', baseCost: 25000n, costRatio: 1600n, clickGain: 0n, passiveGain: 500n, toast: '이제 카페를 넘어 시스템을 파는 단계가 되었다.' },
      { id: 'app', name: '앱 출시', emoji: '📱', desc: '클릭당 +50', baseCost: 10000n, costRatio: 1600n, clickGain: 50n, passiveGain: 0n, toast: '앱 알림 하나로 주문이 몰려온다.' }
    ];

    const statsEl = document.getElementById('stats');
    const milestoneEl = document.getElementById('milestone');
    const buttonWrapEl = document.getElementById('btn-wrap');
    const brewButtonEl = document.getElementById('brew-btn');
    const coffeeNameEl = document.getElementById('coffee-name');
    const coffeeDescEl = document.getElementById('coffee-desc');
    const cpcLabelEl = document.getElementById('cpc-label');
    const cafeStoryEl = document.getElementById('cafe-story');
    const toastAreaEl = document.getElementById('toast-area');
    const shopEl = document.getElementById('shop');
    const prestigeTitleEl = document.getElementById('prestige-title');
    const prestigeBeansEl = document.getElementById('prestige-beans');
    const prestigeBonusEl = document.getElementById('prestige-bonus');
    const prestigePreviewEl = document.getElementById('prestige-preview');
    const prestigeButtonEl = document.getElementById('prestige-btn');

    const shopRefs = {};

    let runState = createRunState();
    let prestigeState = createPrestigeState();
    let toastTimer = null;
    let clickCount = 0n;
    let drawCount = 0;
    let frameCount = 0;
    let lastFrameAt = 0;
    let lastDrawAt = 0;
    let lastSaveAt = 0;
    let lastPulseAt = 0;
    let dirty = true;
    let drawUrgent = true;
    let lastCoffeeUnlockAt = 0n;

    function createOwnedMap() {
      return Object.fromEntries(UPGRADES.map((upgrade) => [upgrade.id, 0n]));
    }

    function createCostMap() {
      return Object.fromEntries(UPGRADES.map((upgrade) => [upgrade.id, toRaw(upgrade.baseCost)]));
    }

    function createRunState() {
      return {
        coinsRaw: 0n,
        totalRaw: 0n,
        cups: 0n,
        owned: createOwnedMap(),
        costs: createCostMap(),
        passiveBuffer: 0n,
        sessionStartedAt: Date.now()
      };
    }

    function createPrestigeState() {
      return {
        goldenBeans: 0n,
        prestigeCount: 0n,
        bestRunRaw: 0n
      };
    }

    function toRaw(whole) {
      return whole * SCALE;
    }

    function fromRaw(raw) {
      return raw / SCALE;
    }

    function parseWhole(value) {
      if (typeof value === 'bigint') {
        return value;
      }
      if (typeof value === 'number') {
        return BigInt(Math.floor(value));
      }
      if (typeof value === 'string' && value.trim()) {
        return BigInt(value);
      }
      return 0n;
    }

    function parseRawFromWhole(value) {
      return toRaw(parseWhole(value));
    }

    function maxBigInt(a, b) {
      return a > b ? a : b;
    }

    function sqrtBigInt(value) {
      if (value < 2n) {
        return value;
      }
      let x0 = value;
      let x1 = (x0 + value / x0) / 2n;
      while (x1 < x0) {
        x0 = x1;
        x1 = (x0 + value / x0) / 2n;
      }
      return x0;
    }

    function addCommas(text) {
      return text.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    function formatWholeBigInt(value) {
      const negative = value < 0n;
      const absolute = negative ? -value : value;
      const unitNames = ['', '만', '억', '조', '경', '해', '자', '양'];
      if (absolute < 10000n) {
        const plain = addCommas(absolute.toString());
        return negative ? `-${plain}` : plain;
      }
      const digits = absolute.toString();
      const unitIndex = Math.min(unitNames.length - 1, Math.floor((digits.length - 1) / 4));
      const pivot = digits.length - unitIndex * 4;
      const head = digits.slice(0, pivot);
      const tail = digits.slice(pivot);
      const decimal = tail.replace(/0+$/, '').slice(0, 1);
      const body = decimal ? `${head}.${decimal}` : head;
      return negative ? `-${body}${unitNames[unitIndex]}` : `${body}${unitNames[unitIndex]}`;
    }

    function formatRaw(raw) {
      return formatWholeBigInt(fromRaw(raw));
    }

    function formatPercentBps(bps) {
      return formatWholeBigInt((bps - BPS_BASE) / 100n);
    }

    function stringifyOwnedMap(map) {
      const next = {};
      UPGRADES.forEach((upgrade) => {
        next[upgrade.id] = (map[upgrade.id] || 0n).toString();
      });
      return next;
    }

    function getIncomeMultiplierBps() {
      return BPS_BASE + prestigeState.goldenBeans * PRESTIGE_BONUS_PER_BEAN;
    }

    function applyIncomeMultiplier(rawAmount) {
      return rawAmount * getIncomeMultiplierBps() / BPS_BASE;
    }

    function getClickBaseRaw() {
      let total = toRaw(1n);
      UPGRADES.forEach((upgrade) => {
        total += toRaw(upgrade.clickGain) * runState.owned[upgrade.id];
      });
      return total;
    }

    function getPassiveBaseRaw() {
      let total = 0n;
      UPGRADES.forEach((upgrade) => {
        total += toRaw(upgrade.passiveGain) * runState.owned[upgrade.id];
      });
      return total;
    }

    function getClickIncomeRaw() {
      return applyIncomeMultiplier(getClickBaseRaw());
    }

    function getPassiveIncomeRaw() {
      return applyIncomeMultiplier(getPassiveBaseRaw());
    }

    function powRatio(ratio, exponent) {
      let result = COST_RATIO_SCALE;
      let factor = ratio;
      let power = exponent;
      while (power > 0n) {
        if (power % 2n === 1n) {
          result = result * factor / COST_RATIO_SCALE;
        }
        factor = factor * factor / COST_RATIO_SCALE;
        power /= 2n;
      }
      return result;
    }

    function rebuildCostsFromOwned() {
      UPGRADES.forEach((upgrade) => {
        const ownedCount = runState.owned[upgrade.id] || 0n;
        const multiplier = powRatio(upgrade.costRatio, ownedCount);
        let rawCost = toRaw(upgrade.baseCost) * multiplier / COST_RATIO_SCALE;
        if (rawCost < SCALE) {
          rawCost = SCALE;
        }
        runState.costs[upgrade.id] = rawCost;
      });
    }

    function getWholeCost(id) {
      return fromRaw(runState.costs[id]);
    }

    function getCurrentCoffee() {
      const totalWhole = fromRaw(runState.totalRaw);
      let current = COFFEES[0];
      for (let index = 0; index < COFFEES.length; index += 1) {
        if (totalWhole >= COFFEES[index].unlockAt) {
          current = COFFEES[index];
        }
      }
      if (totalWhole < COFFEES[COFFEES.length - 1].unlockAt) {
        return current;
      }
      const stage = maxBigInt(1n, totalWhole / COFFEE_STAGE_STEP);
      return {
        unlockAt: COFFEES[COFFEES.length - 1].unlockAt,
        name: `무한 로스터리 ${formatWholeBigInt(stage)}단계`,
        desc: '황금 원두와 누적 수익을 바탕으로 카페가 끝없이 확장되는 운영 구간이다.',
        emoji: '♾️'
      };
    }

    function getCurrentMilestone() {
      const totalWhole = fromRaw(runState.totalRaw);
      let current = MILESTONES[0];
      for (let index = 0; index < MILESTONES.length; index += 1) {
        if (totalWhole >= MILESTONES[index].unlockAt) {
          current = MILESTONES[index];
        }
      }
      if (totalWhole < MILESTONES[MILESTONES.length - 1].unlockAt) {
        return current;
      }
      const stage = maxBigInt(1n, totalWhole / COFFEE_STAGE_STEP);
      return {
        name: `글로벌 프랜차이즈 ${formatWholeBigInt(stage)}단계`,
        desc: '엔딩 대신 환생과 영구 버프로 성장 곡선을 다시 밀어 올리는 무한 방치형 구간이다.'
      };
    }

    function getPrestigePreview() {
      const totalWhole = fromRaw(runState.totalRaw);
      if (totalWhole < PRESTIGE_THRESHOLD) {
        return 0n;
      }
      return sqrtBigInt(totalWhole / PRESTIGE_THRESHOLD);
    }

    function serializeGame() {
      return JSON.stringify({
        version: SAVE_VERSION,
        run: {
          coins: fromRaw(runState.coinsRaw).toString(),
          total: fromRaw(runState.totalRaw).toString(),
          cups: runState.cups.toString(),
          owned: stringifyOwnedMap(runState.owned)
        },
        prestige: {
          goldenBeans: prestigeState.goldenBeans.toString(),
          prestigeCount: prestigeState.prestigeCount.toString(),
          bestRun: fromRaw(prestigeState.bestRunRaw).toString()
        }
      });
    }

    function saveGame() {
      if (typeof localStorage === 'undefined') {
        return;
      }
      localStorage.setItem(SAVE_KEY, serializeGame());
      lastSaveAt = Date.now();
    }

    function loadModernSave(saved) {
      if (saved.run) {
        if (Object.prototype.hasOwnProperty.call(saved.run, 'coins')) {
          runState.coinsRaw = parseRawFromWhole(saved.run.coins);
        }
        if (Object.prototype.hasOwnProperty.call(saved.run, 'total')) {
          runState.totalRaw = parseRawFromWhole(saved.run.total);
        }
        if (Object.prototype.hasOwnProperty.call(saved.run, 'cups')) {
          runState.cups = parseWhole(saved.run.cups);
        }
        if (saved.run.owned && typeof saved.run.owned === 'object') {
          runState.owned = createOwnedMap();
          UPGRADES.forEach((upgrade) => {
            runState.owned[upgrade.id] = parseWhole(saved.run.owned[upgrade.id]);
          });
        }
      }
      if (saved.prestige) {
        if (Object.prototype.hasOwnProperty.call(saved.prestige, 'goldenBeans')) {
          prestigeState.goldenBeans = parseWhole(saved.prestige.goldenBeans);
        }
        if (Object.prototype.hasOwnProperty.call(saved.prestige, 'prestigeCount')) {
          prestigeState.prestigeCount = parseWhole(saved.prestige.prestigeCount);
        }
        if (Object.prototype.hasOwnProperty.call(saved.prestige, 'bestRun')) {
          prestigeState.bestRunRaw = parseRawFromWhole(saved.prestige.bestRun);
        }
      }
      prestigeState.bestRunRaw = maxBigInt(prestigeState.bestRunRaw, runState.totalRaw);
      runState.sessionStartedAt = Date.now();
      runState.passiveBuffer = 0n;
      rebuildCostsFromOwned();
    }

    function loadLegacySave(saved) {
      if (Object.prototype.hasOwnProperty.call(saved, 'coins')) {
        runState.coinsRaw = parseRawFromWhole(saved.coins);
      }
      if (Object.prototype.hasOwnProperty.call(saved, 'total')) {
        runState.totalRaw = parseRawFromWhole(saved.total);
      }
      if (Object.prototype.hasOwnProperty.call(saved, 'cups')) {
        runState.cups = parseWhole(saved.cups);
      }
      if (saved.owned && typeof saved.owned === 'object') {
        runState.owned = createOwnedMap();
        UPGRADES.forEach((upgrade) => {
          runState.owned[upgrade.id] = parseWhole(saved.owned[upgrade.id]);
        });
      }
      prestigeState.bestRunRaw = maxBigInt(prestigeState.bestRunRaw, runState.totalRaw);
      rebuildCostsFromOwned();
    }

    function loadGame() {
      if (typeof localStorage === 'undefined') {
        return;
      }
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) {
        return;
      }
      try {
        const saved = JSON.parse(raw);
        if (saved && (saved.version === SAVE_VERSION || saved.run || saved.prestige)) {
          loadModernSave(saved);
          return;
        }
        if (saved && (Object.prototype.hasOwnProperty.call(saved, 'coins') || Object.prototype.hasOwnProperty.call(saved, 'total'))) {
          loadLegacySave(saved);
        }
      } catch (error) {
        runState = createRunState();
        prestigeState = createPrestigeState();
      }
    }

    function showToast(message) {
      clearTimeout(toastTimer);
      toastAreaEl.innerHTML = `<div class="toast">${message}</div>`;
      toastTimer = setTimeout(() => {
        toastAreaEl.innerHTML = '<div class="toast-placeholder"></div>';
      }, 2200);
    }

    function animateButton(className) {
      brewButtonEl.classList.remove(className);
      void brewButtonEl.offsetWidth;
      brewButtonEl.classList.add(className);
      setTimeout(() => {
        brewButtonEl.classList.remove(className);
      }, 360);
    }

    function getParticleSize(rawAmount) {
      const whole = fromRaw(rawAmount);
      if (whole >= 50n) {
        return 24;
      }
      if (whole >= 10n) {
        return 18;
      }
      return 14;
    }

    function createParticleAt(text, left, top, size, burst) {
      const particle = document.createElement('div');
      particle.className = burst ? 'particle burst' : 'particle';
      particle.textContent = text;
      particle.style.left = `${left}px`;
      particle.style.top = `${top}px`;
      particle.style.fontSize = `${size}px`;
      buttonWrapEl.appendChild(particle);
      setTimeout(() => {
        particle.remove();
      }, burst ? 1000 : 850);
    }

    function createValueParticle(rawAmount, event) {
      const bounds = buttonWrapEl.getBoundingClientRect();
      const left = event.clientX - bounds.left - 16;
      const top = event.clientY - bounds.top - 8;
      createParticleAt(`+${formatRaw(rawAmount)}`, left, top, getParticleSize(rawAmount), false);
    }

    function createCoffeeBurst() {
      const coffee = getCurrentCoffee();
      const offsets = [
        { left: 56, top: 74 },
        { left: 76, top: 46 },
        { left: 96, top: 74 },
        { left: 64, top: 102 },
        { left: 92, top: 104 }
      ];
      for (let index = 0; index < offsets.length; index += 1) {
        createParticleAt(coffee.emoji, offsets[index].left, offsets[index].top, 22, true);
      }
    }

    function markDirty(urgent) {
      dirty = true;
      if (urgent) {
        drawUrgent = true;
      }
    }

    function buildShop() {
      shopEl.innerHTML = '';
      UPGRADES.forEach((upgrade) => {
        const button = document.createElement('button');
        button.className = 'upg-btn';
        button.dataset.id = upgrade.id;

        const icon = document.createElement('span');
        icon.className = 'upg-icon';

        const info = document.createElement('div');
        info.className = 'upg-info';

        const row1 = document.createElement('div');
        row1.className = 'upg-row1';

        const name = document.createElement('span');
        name.className = 'upg-name';

        const count = document.createElement('span');
        count.className = 'upg-count';

        const row2 = document.createElement('div');
        row2.className = 'upg-row2';

        const desc = document.createElement('span');
        desc.className = 'upg-desc';

        const cost = document.createElement('span');
        cost.className = 'upg-cost';

        row1.appendChild(name);
        row1.appendChild(count);
        row2.appendChild(desc);
        row2.appendChild(cost);
        info.appendChild(row1);
        info.appendChild(row2);
        button.appendChild(icon);
        button.appendChild(info);
        button.addEventListener('click', () => {
          buyUpgrade(upgrade.id);
        });
        shopEl.appendChild(button);

        shopRefs[upgrade.id] = { button, icon, name, count, desc, cost };
      });
    }

    function renderStats() {
      const items = [
        ['보유', `${formatRaw(runState.coinsRaw)}원`],
        ['초당', `${formatRaw(getPassiveIncomeRaw())}/s`],
        ['판매', `${formatWholeBigInt(runState.cups)}잔`]
      ];
      statsEl.innerHTML = items.map(([label, value]) => `
        <div class="stat-card">
          <div class="label">${label}</div>
          <div class="value">${value}</div>
        </div>
      `).join('');
    }

    function renderCoffee() {
      const coffee = getCurrentCoffee();
      brewButtonEl.textContent = coffee.emoji;
      coffeeNameEl.textContent = coffee.name;
      coffeeDescEl.textContent = coffee.desc;
    }

    function renderMilestone() {
      const milestone = getCurrentMilestone();
      milestoneEl.textContent = milestone.name;
      cafeStoryEl.textContent = milestone.desc;
    }

    function renderShop() {
      UPGRADES.forEach((upgrade) => {
        const refs = shopRefs[upgrade.id];
        const ownedCount = runState.owned[upgrade.id];
        const canPurchase = runState.coinsRaw >= runState.costs[upgrade.id];
        refs.button.disabled = !canPurchase;
        refs.icon.textContent = upgrade.emoji;
        refs.name.textContent = upgrade.name;
        refs.count.hidden = ownedCount === 0n;
        refs.count.textContent = ownedCount === 0n ? '' : formatWholeBigInt(ownedCount);
        refs.desc.textContent = upgrade.desc;
        refs.cost.textContent = `${formatRaw(runState.costs[upgrade.id])}원`;
        refs.cost.className = canPurchase ? 'upg-cost' : 'upg-cost muted';
      });
    }

    function renderPrestige() {
      const gain = getPrestigePreview();
      prestigeTitleEl.textContent = '환생';
      prestigeBeansEl.textContent = `황금 원두 ${formatWholeBigInt(prestigeState.goldenBeans)}개`;
      prestigeBonusEl.textContent = `영구 수익 +${formatPercentBps(getIncomeMultiplierBps())}%`;
      prestigePreviewEl.textContent = `지금 환생하면 황금 원두 +${formatWholeBigInt(gain)}`;
      prestigeButtonEl.disabled = gain < 1n;
    }

    function draw() {
      drawCount += 1;
      renderStats();
      renderCoffee();
      renderMilestone();
      renderShop();
      renderPrestige();
      cpcLabelEl.textContent = `클릭당 ${formatRaw(getClickIncomeRaw())}원`;
      dirty = false;
      drawUrgent = false;
    }

    function scheduleAutoSave(timestamp) {
      if (typeof localStorage === 'undefined') {
        return;
      }
      if (timestamp - lastSaveAt >= AUTO_SAVE_INTERVAL_MS) {
        saveGame();
        lastSaveAt = timestamp;
      }
    }

    function applyPassiveIncome(deltaMs, timestamp) {
      const passiveRaw = getPassiveIncomeRaw();
      if (passiveRaw < 1n || deltaMs < 1n) {
        return;
      }
      const earnedPool = runState.passiveBuffer + passiveRaw * deltaMs;
      const earnedRaw = earnedPool / 1000n;
      runState.passiveBuffer = earnedPool % 1000n;
      if (earnedRaw < 1n) {
        return;
      }
      runState.coinsRaw += earnedRaw;
      runState.totalRaw += earnedRaw;
      prestigeState.bestRunRaw = maxBigInt(prestigeState.bestRunRaw, runState.totalRaw);
      if (timestamp - lastPulseAt >= 240) {
        animateButton('pulse');
        lastPulseAt = timestamp;
      }
      markDirty(false);
      scheduleAutoSave(timestamp);
    }

    function buyUpgrade(id) {
      const upgrade = UPGRADES.find((item) => item.id === id);
      if (!upgrade) {
        return false;
      }
      const costRaw = runState.costs[id];
      if (runState.coinsRaw < costRaw) {
        return false;
      }
      const firstPurchase = runState.owned[id] === 0n;
      runState.coinsRaw -= costRaw;
      runState.owned[id] += 1n;
      runState.costs[id] = maxBigInt(SCALE, costRaw * upgrade.costRatio / COST_RATIO_SCALE);
      if (firstPurchase) {
        const extra = upgrade.toast ? ` ${upgrade.toast}` : '';
        showToast(`${upgrade.emoji} ${upgrade.name} 구매!${extra}`);
      }
      markDirty(true);
      saveGame();
      return true;
    }

    function performPrestige() {
      const gain = getPrestigePreview();
      if (gain < 1n) {
        return false;
      }
      prestigeState.goldenBeans += gain;
      prestigeState.prestigeCount += 1n;
      prestigeState.bestRunRaw = maxBigInt(prestigeState.bestRunRaw, runState.totalRaw);
      runState = createRunState();
      clickCount = 0n;
      lastCoffeeUnlockAt = 0n;
      showToast(`✨ 환생 완료! 황금 원두 +${formatWholeBigInt(gain)}`);
      markDirty(true);
      saveGame();
      return true;
    }

    function handleBrew(event) {
      const amountRaw = getClickIncomeRaw();
      runState.coinsRaw += amountRaw;
      runState.totalRaw += amountRaw;
      runState.cups += 1n;
      prestigeState.bestRunRaw = maxBigInt(prestigeState.bestRunRaw, runState.totalRaw);
      clickCount += 1n;
      createValueParticle(amountRaw, event);
      if (clickCount % 100n === 0n) {
        createCoffeeBurst();
      }
      const currentCoffee = getCurrentCoffee();
      if (currentCoffee.unlockAt > lastCoffeeUnlockAt) {
        animateButton('scale-up');
        showToast(`${currentCoffee.emoji} 새로운 커피 해금! ${currentCoffee.name}`);
        lastCoffeeUnlockAt = currentCoffee.unlockAt;
      } else {
        lastCoffeeUnlockAt = currentCoffee.unlockAt;
      }
      markDirty(true);
      saveGame();
    }

    function gameLoop(timestamp) {
      frameCount += 1;
      if (lastFrameAt === 0) {
        lastFrameAt = timestamp;
      }
      const deltaMs = BigInt(Math.max(0, Math.floor(timestamp - lastFrameAt)));
      lastFrameAt = timestamp;
      applyPassiveIncome(deltaMs, timestamp);
      if (dirty && (drawUrgent || timestamp - lastDrawAt >= DRAW_INTERVAL_MS)) {
        draw();
        lastDrawAt = timestamp;
      }
      requestAnimationFrame(gameLoop);
    }

    function exportSnapshotForTest() {
      return {
        run: {
          coins: fromRaw(runState.coinsRaw).toString(),
          total: fromRaw(runState.totalRaw).toString(),
          cups: runState.cups.toString(),
          owned: stringifyOwnedMap(runState.owned)
        },
        prestige: {
          goldenBeans: prestigeState.goldenBeans.toString(),
          prestigeCount: prestigeState.prestigeCount.toString(),
          bestRun: fromRaw(prestigeState.bestRunRaw).toString()
        }
      };
    }

    function importSnapshotForTest(next) {
      if (next.run) {
        if (Object.prototype.hasOwnProperty.call(next.run, 'coins')) {
          runState.coinsRaw = parseRawFromWhole(next.run.coins);
        }
        if (Object.prototype.hasOwnProperty.call(next.run, 'total')) {
          runState.totalRaw = parseRawFromWhole(next.run.total);
        }
        if (Object.prototype.hasOwnProperty.call(next.run, 'cups')) {
          runState.cups = parseWhole(next.run.cups);
        }
        if (next.run.owned && typeof next.run.owned === 'object') {
          const mergedOwned = createOwnedMap();
          UPGRADES.forEach((upgrade) => {
            mergedOwned[upgrade.id] = Object.prototype.hasOwnProperty.call(next.run.owned, upgrade.id)
              ? parseWhole(next.run.owned[upgrade.id])
              : runState.owned[upgrade.id];
          });
          runState.owned = mergedOwned;
        }
        runState.passiveBuffer = 0n;
        runState.sessionStartedAt = Date.now();
        rebuildCostsFromOwned();
      }
      if (next.prestige) {
        if (Object.prototype.hasOwnProperty.call(next.prestige, 'goldenBeans')) {
          prestigeState.goldenBeans = parseWhole(next.prestige.goldenBeans);
        }
        if (Object.prototype.hasOwnProperty.call(next.prestige, 'prestigeCount')) {
          prestigeState.prestigeCount = parseWhole(next.prestige.prestigeCount);
        }
        if (Object.prototype.hasOwnProperty.call(next.prestige, 'bestRun')) {
          prestigeState.bestRunRaw = parseRawFromWhole(next.prestige.bestRun);
        }
      }
      prestigeState.bestRunRaw = maxBigInt(prestigeState.bestRunRaw, runState.totalRaw);
      lastCoffeeUnlockAt = getCurrentCoffee().unlockAt;
      markDirty(true);
      saveGame();
    }

    brewButtonEl.addEventListener('click', handleBrew);
    prestigeButtonEl.addEventListener('click', performPrestige);

    buildShop();
    loadGame();
    rebuildCostsFromOwned();
    lastCoffeeUnlockAt = getCurrentCoffee().unlockAt;
    draw();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
