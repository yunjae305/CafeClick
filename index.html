<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>☕ 카페 클리커</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf7f2;
      --surface: #ffffff;
      --border: rgba(120, 90, 60, 0.15);
      --border-strong: rgba(120, 90, 60, 0.3);
      --text: #2c1f0e;
      --text-soft: #7a6352;
      --text-muted: #b0a090;
      --accent: #a0522d;
      --green-bg: #e8f5e9;
      --green-text: #2e7d32;
      --info-bg: #e3f2fd;
      --info-text: #1565c0;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 16px 24px;
      background: var(--surface);
      border-bottom: 0.5px solid var(--border-strong);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header span {
      font-size: 22px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 500;
      color: var(--accent);
    }

    main {
      width: 100%;
      max-width: 720px;
      padding: 24px 16px;
      display: flex;
      gap: 20px;
    }

    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .stats-row {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .stat-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
    }

    .stat-card .label {
      font-size: 11px;
      color: var(--text-soft);
      margin-bottom: 3px;
    }

    .stat-card .value {
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
    }

    .milestone {
      font-size: 13px;
      color: var(--text-soft);
    }

    .btn-wrap {
      position: relative;
      width: 170px;
      height: 170px;
    }

    #brew-btn {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      border: 0.5px solid var(--border-strong);
      background: var(--surface);
      font-size: 72px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 12px rgba(120, 90, 60, 0.08);
      transition: transform 0.08s, box-shadow 0.08s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    #brew-btn:active {
      transform: scale(0.91);
      box-shadow: none;
    }

    .particle {
      position: absolute;
      font-size: 14px;
      font-weight: 500;
      color: var(--accent);
      pointer-events: none;
      white-space: nowrap;
      animation: float-up 0.85s ease-out forwards;
    }

    @keyframes float-up {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-56px); opacity: 0; }
    }

    .cpc-label {
      font-size: 12px;
      color: var(--text-soft);
    }

    .toast {
      background: var(--green-bg);
      color: var(--green-text);
      border: 0.5px solid rgba(46, 125, 50, 0.25);
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
    }

    .toast-placeholder {
      height: 30px;
    }

    .right {
      width: 210px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .shop-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-soft);
      margin-bottom: 4px;
      padding-left: 2px;
    }

    .upg-btn {
      width: 100%;
      padding: 9px 10px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      text-align: left;
      transition: border-color 0.12s, opacity 0.12s;
      outline: none;
    }

    .upg-btn:hover:not(:disabled) {
      border-color: var(--border-strong);
    }

    .upg-btn:disabled {
      opacity: 0.42;
      cursor: default;
    }

    .upg-icon {
      font-size: 18px;
      flex-shrink: 0;
    }

    .upg-info {
      flex: 1;
      min-width: 0;
    }

    .upg-row1,
    .upg-row2 {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .upg-row1 {
      margin-bottom: 2px;
    }

    .upg-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
    }

    .upg-count {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 99px;
      background: var(--info-bg);
      color: var(--info-text);
      flex-shrink: 0;
    }

    .upg-desc {
      font-size: 10px;
      color: var(--text-soft);
    }

    .upg-cost {
      font-size: 10px;
      font-weight: 500;
      color: var(--text);
    }

    .upg-cost.muted {
      color: var(--text-muted);
    }

    @media (max-width: 520px) {
      main {
        flex-direction: column;
        align-items: center;
      }

      .right {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <span>☕</span>
    <h1>카페 클리커</h1>
  </header>

  <main>
    <div class="left">
      <div class="stats-row" id="stats"></div>
      <div class="milestone" id="milestone">☕ 작은 카페</div>
      <div class="btn-wrap" id="btn-wrap">
        <button id="brew-btn">☕</button>
      </div>
      <div class="cpc-label" id="cpc-label">클릭당 1원</div>
      <div id="toast-area"><div class="toast-placeholder"></div></div>
    </div>

    <div class="right">
      <div class="shop-title">업그레이드</div>
      <div id="shop"></div>
    </div>
  </main>

  <script>
    const UPGRADES = [
      { id: 'beans', name: '좋은 원두', emoji: '🫘', desc: '클릭당 +1', costBase: 15, costMult: 1.6, cpc: 1, cps: 0 },
      { id: 'machine', name: '에스프레소 머신', emoji: '⚙️', desc: '초당 +2', costBase: 50, costMult: 1.6, cpc: 0, cps: 2 },
      { id: 'barista', name: '바리스타 고용', emoji: '👩‍🍳', desc: '초당 +10', costBase: 200, costMult: 1.6, cpc: 0, cps: 10 },
      { id: 'deco', name: '인테리어 개선', emoji: '🪴', desc: '클릭당 +5', costBase: 400, costMult: 1.6, cpc: 5, cps: 0 },
      { id: 'delivery', name: '배달 서비스', emoji: '🛵', desc: '초당 +25', costBase: 1000, costMult: 1.6, cpc: 0, cps: 25 },
      { id: 'branch', name: '2호점 오픈', emoji: '🏪', desc: '초당 +100', costBase: 5000, costMult: 1.6, cpc: 0, cps: 100 },
      { id: 'franchise', name: '프랜차이즈', emoji: '🏢', desc: '초당 +500', costBase: 25000, costMult: 1.6, cpc: 0, cps: 500 },
      { id: 'app', name: '앱 출시', emoji: '📱', desc: '클릭당 +50', costBase: 10000, costMult: 1.6, cpc: 50, cps: 0 }
    ];

    const MILESTONES = [
      [1000000, '🌍 글로벌 브랜드'],
      [100000, '🏢 커피 제국'],
      [10000, '🏪 유명 카페'],
      [1000, '👩‍🍳 지역 명소'],
      [100, '🫘 단골이 생겼어'],
      [0, '☕ 작은 카페']
    ];

    const statsEl = document.getElementById('stats');
    const milestoneEl = document.getElementById('milestone');
    const buttonWrapEl = document.getElementById('btn-wrap');
    const brewButtonEl = document.getElementById('brew-btn');
    const cpcLabelEl = document.getElementById('cpc-label');
    const toastAreaEl = document.getElementById('toast-area');
    const shopEl = document.getElementById('shop');

    let coins = 0;
    let total = 0;
    let cups = 0;
    let owned = {};
    let toastTimer = null;

    function getCost(upgrade) {
      return Math.floor(upgrade.costBase * Math.pow(upgrade.costMult, owned[upgrade.id] || 0));
    }

    function getCPC() {
      return UPGRADES.reduce((sum, upgrade) => sum + upgrade.cpc * (owned[upgrade.id] || 0), 1);
    }

    function getCPS() {
      return UPGRADES.reduce((sum, upgrade) => sum + upgrade.cps * (owned[upgrade.id] || 0), 0);
    }

    function formatNumber(value) {
      const amount = Math.floor(value);
      if (amount >= 1000000) {
        return `${(amount / 1000000).toFixed(1)}M`;
      }
      if (amount >= 1000) {
        return `${(amount / 1000).toFixed(1)}K`;
      }
      return String(amount);
    }

    function getMilestone() {
      return MILESTONES.find(([threshold]) => total >= threshold)[1];
    }

    function renderStats() {
      const items = [
        ['보유', `${formatNumber(coins)}원`],
        ['초당', `${formatNumber(getCPS())}/s`],
        ['판매', `${formatNumber(cups)}잔`]
      ];

      statsEl.innerHTML = items.map(([label, value]) => `
        <div class="stat-card">
          <div class="label">${label}</div>
          <div class="value">${value}</div>
        </div>
      `).join('');
    }

    function renderShop() {
      shopEl.innerHTML = UPGRADES.map((upgrade) => {
        const count = owned[upgrade.id] || 0;
        const cost = getCost(upgrade);
        const canBuy = coins >= cost;
        return `
          <button class="upg-btn" ${canBuy ? '' : 'disabled'} data-id="${upgrade.id}">
            <span class="upg-icon">${upgrade.emoji}</span>
            <div class="upg-info">
              <div class="upg-row1">
                <span class="upg-name">${upgrade.name}</span>
                ${count > 0 ? `<span class="upg-count">${count}</span>` : ''}
              </div>
              <div class="upg-row2">
                <span class="upg-desc">${upgrade.desc}</span>
                <span class="upg-cost ${canBuy ? '' : 'muted'}">${formatNumber(cost)}원</span>
              </div>
            </div>
          </button>
        `;
      }).join('');

      shopEl.querySelectorAll('.upg-btn').forEach((button) => {
        button.addEventListener('click', () => {
          const upgrade = UPGRADES.find((item) => item.id === button.dataset.id);
          const cost = getCost(upgrade);
          if (coins < cost) {
            return;
          }
          const firstPurchase = !owned[upgrade.id];
          coins -= cost;
          owned[upgrade.id] = (owned[upgrade.id] || 0) + 1;
          if (firstPurchase) {
            showToast(`${upgrade.emoji} ${upgrade.name} 구매!`);
          }
          refreshAll();
        });
      });
    }

    function refreshAll() {
      renderStats();
      renderShop();
      milestoneEl.textContent = getMilestone();
      cpcLabelEl.textContent = `클릭당 ${getCPC()}원`;
    }

    function showToast(message) {
      clearTimeout(toastTimer);
      toastAreaEl.innerHTML = `<div class="toast">${message}</div>`;
      toastTimer = setTimeout(() => {
        toastAreaEl.innerHTML = '<div class="toast-placeholder"></div>';
      }, 2200);
    }

    function createParticle(amount, event) {
      const bounds = buttonWrapEl.getBoundingClientRect();
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.textContent = `+${amount}`;
      particle.style.left = `${event.clientX - bounds.left - 16}px`;
      particle.style.top = `${event.clientY - bounds.top - 8}px`;
      buttonWrapEl.appendChild(particle);
      setTimeout(() => particle.remove(), 850);
    }

    brewButtonEl.addEventListener('click', (event) => {
      const amount = getCPC();
      coins += amount;
      total += amount;
      cups += 1;
      createParticle(amount, event);
      refreshAll();
    });

    setInterval(() => {
      const cps = getCPS();
      if (!cps) {
        return;
      }
      coins += cps / 10;
      total += cps / 10;
      refreshAll();
    }, 100);

    refreshAll();
  </script>
</body>
</html>
